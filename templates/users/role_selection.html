{% extends 'base.html' %}

{% block content %}
<div style="max-width: 900px; margin: 4rem auto; text-align: center;">
    <h1 style="font-size: 2.5rem; margin-bottom: 3rem;">Choose Your Path</h1>

    <div style="display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap;">
        <!-- Candidate Card -->
        <div class="role-card" onclick="selectRole('candidate')">
            <div class="role-icon" style="background: rgba(79, 70, 229, 0.1); color: #4f46e5;">🧙‍♂️</div>
            <h3>Candidate</h3>
            <p>I want to practice aptitude, earn rewards, and level up my skills.</p>
            <form method="post" id="form-candidate" action="{% url 'role_selection' %}">
                {% csrf_token %}
                <input type="hidden" name="role" value="candidate">
                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Start Playing</button>
            </form>
        </div>

        <!-- Company Card -->
        <div class="role-card" onclick="selectRole('company')">
            <div class="role-icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">🏢</div>
            <h3>Recruiter</h3>
            <p>I want to find top talent and scout high-performing candidates.</p>
            <form method="post" id="form-company" action="{% url 'role_selection' %}">
                {% csrf_token %}
                <input type="hidden" name="role" value="company">
                <button type="submit" class="btn btn-secondary" style="width: 100%; margin-top: 1rem;">Find
                    Talent</button>
            </form>
        </div>
    </div>
</div>

<style>
    .role-card {
        background: var(--card-bg);
        padding: 2.5rem;
        border-radius: 20px;
        flex: 1;
        min-width: 300px;
        border: 2px solid transparent;
        transition: all 0.3s ease;
        text-align: left;
        cursor: pointer;
        box-shadow: var(--shadow);
    }

    .role-card:hover {
        transform: translateY(-8px);
        border-color: var(--primary-color);
        box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1);
    }

    .role-icon {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        margin-bottom: 1.5rem;
    }

    .role-card h3 {
        margin: 0 0 0.5rem 0;
        font-size: 1.5rem;
    }

    .role-card p {
        color: #6b7280;
        margin-bottom: 1.5rem;
        line-height: 1.6;
    }
</style>

<script>
    function selectRole(role) {
        // Optional: Auto submit on card click if not clicking the button directly
        // document.getElementById('form-' + role).submit();
    }
</script>
{% endblock %}
