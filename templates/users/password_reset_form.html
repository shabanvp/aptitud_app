{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2 style="margin-top: 0; text-align: center;">Reset Password</h2>
        <p style="text-align: center; color: #a0aec0; margin-bottom: 2rem;">
            Enter your email address below, and we'll email instructions for setting a new one.
        </p>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <div style="color: red; font-size: 0.8rem; margin-top: 5px;">{{ field.errors }}</div>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Send Reset Email</button>
        </form>
    </div>
</div>
{% endblock %}
